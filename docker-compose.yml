version: "3.9"
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tradingmine
      REDIS_URL: redis://redis:6379
      MARKET: ${MARKET:-CN_A_SHARE}
      MARKET_DATA_MODE: ${MARKET_DATA_MODE:-live}
      MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER:-tushare}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      TUSHARE_BASE_URL: ${TUSHARE_BASE_URL:-https://api.tushare.pro}
      RQDATA_ENABLED: ${RQDATA_ENABLED:-false}
      RQDATA_USERNAME: ${RQDATA_USERNAME:-}
      RQDATA_PASSWORD: ${RQDATA_PASSWORD:-}
      RQDATA_BASE_URL: ${RQDATA_BASE_URL:-}
      REALTIME_ENABLED: ${REALTIME_ENABLED:-true}
      REALTIME_POLL_SECONDS: ${REALTIME_POLL_SECONDS:-5}
      REALTIME_AUCTION_POLL_SECONDS: ${REALTIME_AUCTION_POLL_SECONDS:-3}
      REALTIME_WATCHLIST_BATCH_SIZE: ${REALTIME_WATCHLIST_BATCH_SIZE:-50}
      REALTIME_SCAN_BATCH_SIZE: ${REALTIME_SCAN_BATCH_SIZE:-200}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    depends_on:
      - db
      - redis
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tradingmine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  pgdata:
